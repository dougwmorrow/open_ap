[pytest]
testpaths = tests
markers =
    uat: requires a live SQL Server connection — auto-skipped unless CDC_UAT_ENABLED=1
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S
filterwarnings =
    ignore::DeprecationWarning
