name: Mechanism C-1 CI mirror

# Cycle 2 of Mechanism C-1 (B-311 closure 2026-05-16): server-side mirror of
# the local pre-commit + commit-msg hooks. Catches --no-verify bypasses + devs
# who didn't install hooks locally (per critical-review hole 19 + 20).
#
# Runs on every push + every pull_request. Computes changed files vs base ref,
# invokes tools/pre_commit_checks.py orchestrator with --files flag, fails
# job on BLOCK exit codes. Also runs tools/check_commit_msg.py against the
# range of commit messages introduced.
#
# To enable BRANCH PROTECTION enforcement (so PRs cannot merge unless this CI
# passes): configure GitHub branch protection rule on `main` with
# "Require status checks to pass before merging" → select "Mechanism C-1 CI mirror".
#
# Producer cannot bypass via --no-verify on local (it bypasses the local hook
# but NOT this CI mirror). Server-side enforcement is the architectural
# completion of Mechanism C-1.

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  pre-commit-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch enough history to compute diff vs base ref
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install minimal dependencies (orchestrator + tests)
        run: |
          python -m pip install --upgrade pip
          # Minimal deps for orchestrator + canonical test surface
          # Full pipeline deps NOT installed (would take 5+ min); CI orchestrator
          # only needs Python stdlib + pytest + optional lint tools
          python -m pip install pytest pyyaml
          # Optional quality-check tools (orchestrator graceful-skips if absent;
          # install in CI for full enforcement per Cycle 1 Improvement 1)
          python -m pip install ruff bandit mypy || true

      - name: Compute changed files vs base ref
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # push event
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            # Handle initial push (BASE_SHA is all-zeros)
            if [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
            fi
          fi
          if [ -z "${BASE_SHA}" ]; then
            echo "Cannot determine base SHA; running orchestrator with no files"
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            FILES=$(git diff --name-only --diff-filter=ACM "${BASE_SHA}...${HEAD_SHA}" | tr '\n' ',' | sed 's/,$//')
            echo "Changed files: ${FILES}"
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit orchestrator (Mechanism C-1 mirror)
        run: |
          FILES="${{ steps.changed-files.outputs.files }}"
          if [ -z "${FILES}" ]; then
            echo "No changed files; orchestrator skipped"
            exit 0
          fi
          python tools/pre_commit_checks.py --files "${FILES}" --verbose --no-audit

  commit-msg-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check commit messages in push/PR range for exemption-claim phrases
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.event.after }}"
            if [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
              BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || echo '')"
            fi
          fi
          if [ -z "${BASE_SHA}" ]; then
            echo "Cannot determine base SHA; commit-msg check skipped"
            exit 0
          fi
          # For each commit in the range, check its message
          EXIT_CODE=0
          for SHA in $(git rev-list "${BASE_SHA}...${HEAD_SHA}"); do
            COMMIT_MSG=$(git log -1 --format=%B "${SHA}")
            MSG_FILE=$(mktemp)
            echo "${COMMIT_MSG}" > "${MSG_FILE}"
            echo "Checking commit ${SHA:0:8}..."
            if ! python tools/check_commit_msg.py "${MSG_FILE}"; then
              echo "  ↑ Exemption-claim phrase found in commit ${SHA:0:8}"
              EXIT_CODE=1
            fi
            rm "${MSG_FILE}"
          done
          exit ${EXIT_CODE}
